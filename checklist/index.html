<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC | ELITE CYBER-OPS TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --hc-red: #FF0000;
            --hc-black: #020202;
            --hc-white: #FFFFFF;
            --hc-green: #00FF41;
            --hc-gray: #151515;
            --hc-red-dim: rgba(255, 0, 0, 0.15);
        }

        body {
            background-color: var(--hc-black);
            color: var(--hc-white);
            font-family: 'JetBrains Mono', monospace;
            min-height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Capas de Fondo */
        #global-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.5;
        }

        .cyber-grid {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(var(--hc-red-dim) 1px, transparent 1px),
                linear-gradient(90deg, var(--hc-red-dim) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: -2;
        }

        /* Estética de Terminal Militar */
        .cyber-border {
            border: 2px solid var(--hc-gray);
            background: rgba(0, 0, 0, 0.95);
            position: relative;
            clip-path: polygon(0 0, 95% 0, 100% 20px, 100% 100%, 5% 100%, 0 95%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cyber-border:hover {
            border-color: var(--hc-red);
            box-shadow: 0 0 25px var(--hc-red-dim);
        }

        .sector-num {
            font-size: 8rem;
            font-weight: 900;
            color: rgba(255, 0, 0, 0.04);
            position: absolute;
            bottom: -20px; right: 10px;
            pointer-events: none;
            font-style: italic;
        }

        /* Animaciones */
        @keyframes scanline {
            0% { top: -5%; }
            100% { top: 105%; }
        }

        .scanner {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 3px;
            background: linear-gradient(to right, transparent, var(--hc-red), transparent);
            box-shadow: 0 0 15px var(--hc-red);
            z-index: 100;
            pointer-events: none;
            animation: scanline 6s linear infinite;
        }

        .glitch-flash {
            animation: glitch 0.2s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px) scale(1.02); color: var(--hc-green); }
            40% { transform: translate(-3px, -3px); color: var(--hc-red); }
            60% { transform: translate(3px, 3px); }
            100% { transform: translate(0); }
        }

        .timer-active {
            animation: pulse-border 1s infinite alternate;
        }

        @keyframes pulse-border {
            from { border-color: var(--hc-gray); box-shadow: 0 0 0px transparent; }
            to { border-color: var(--hc-red); box-shadow: 0 0 15px var(--hc-red); }
        }

        /* Boton Tactico */
        .hc-button {
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid var(--hc-gray);
            padding: 14px 28px;
            font-size: 0.8rem;
            font-weight: 900;
            letter-spacing: 3px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hc-button:hover {
            background: var(--hc-red);
            color: white;
            border-color: white;
            transform: skewX(-5deg);
        }

        .tab-active {
            border-bottom: 5px solid var(--hc-red) !important;
            background: rgba(255, 0, 0, 0.15) !important;
            color: var(--hc-red);
        }

        .check-item {
            border-left: 4px solid transparent;
        }
        .check-item.done {
            border-left-color: var(--hc-green);
            background: rgba(0, 255, 65, 0.05);
        }

        /* Scrollbar Personalizada */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: black; }
        ::-webkit-scrollbar-thumb { background: var(--hc-red); border-radius: 10px; }

        #hidden-canvas { display: none; }
    </style>
</head>
<body class="p-2 md:p-6 select-none overflow-hidden">
    <canvas id="global-canvas"></canvas>
    <canvas id="hidden-canvas"></canvas>
    <div class="cyber-grid"></div>
    <div class="scanner"></div>

    <div class="max-w-7xl mx-auto space-y-4 flex flex-col h-screen">
        
        <!-- CABECERA TÁCTICA -->
        <header class="flex flex-col md:flex-row justify-between items-center bg-black/95 border-b-4 border-red-600 p-8 cyber-border shadow-2xl">
            <div class="flex items-center gap-8">
                <img src="https://hammercircuit.com/hammer-circuit-logo.png" alt="HC Logo" class="h-14 hover:scale-110 transition-transform cursor-pointer" onmouseenter="AudioSfx.hover(1200)">
                <div class="border-l-4 border-zinc-800 pl-8">
                    <p class="text-[10px] text-red-600 font-black tracking-[0.4em] mb-1">MISIÓN_IDENTIFICADOR</p>
                    <input type="text" id="client-name" 
                           class="bg-transparent text-3xl font-black outline-none border-b-2 border-transparent focus:border-red-600 w-full md:w-96 text-white uppercase italic" 
                           value="OPERACIÓN_GHOST"
                           onmouseenter="AudioSfx.hover(400)"
                           onchange="save()">
                </div>
            </div>

            <div class="flex items-center gap-12">
                <div class="text-center hidden md:block border-x border-zinc-800 px-10">
                    <p class="text-[10px] text-zinc-500 font-black mb-3 tracking-widest">CONSUMO_MARGEN_2H</p>
                    <div class="flex items-center gap-4">
                        <div class="w-40 h-3 bg-zinc-900 border border-zinc-700 relative overflow-hidden rounded-full">
                            <div id="margin-bar" class="h-full bg-red-600 transition-all duration-700 shadow-[0_0_10px_red]" style="width: 0%"></div>
                        </div>
                        <span id="margin-val" class="text-lg font-black italic">0%</span>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-zinc-500 font-black tracking-widest">RELOJ_MAESTRO</p>
                    <h2 id="master-timer" class="text-5xl font-black italic tracking-tighter text-white">00:00:00<span class="text-base opacity-40">.00</span></h2>
                </div>
            </div>
        </header>

        <!-- MENÚ DE OPERACIONES -->
        <nav class="grid grid-cols-3 gap-2">
            <button onclick="setTab('timer')" onmouseenter="AudioSfx.hover(600)" id="nav-timer" class="hc-button tab-active">MOD_TIEMPO</button>
            <button onclick="setTab('checklist')" onmouseenter="AudioSfx.hover(800)" id="nav-checklist" class="hc-button">MOD_PROTOCOLO</button>
            <button onclick="setTab('history')" onmouseenter="AudioSfx.hover(1000)" id="nav-history" class="hc-button">MOD_BITÁCORA</button>
        </nav>

        <!-- VISUALIZADOR CENTRAL -->
        <div class="flex-grow overflow-y-auto pr-4 custom-scroll" style="max-height: 55vh;">
            
            <!-- CRONÓMETRO DE FASES -->
            <div id="view-timer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 p-2">
                <!-- Se inyectan tarjetas dinámicas -->
            </div>

            <!-- CHECKLIST DE CUMPLIMIENTO -->
            <div id="view-checklist" class="hidden space-y-8 p-2">
                <div class="flex justify-between items-end border-b border-zinc-800 pb-4">
                    <h3 class="text-xl font-black italic">Estado de Protocolo</h3>
                    <div id="check-progress-text" class="text-sm font-bold text-red-600 tracking-widest">0/31 COMPLETADOS</div>
                </div>
                <div id="checklist-render" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Checkbox items -->
                </div>
            </div>

            <!-- HISTORIAL DE MISIONES -->
            <div id="view-history" class="hidden space-y-4">
                <div id="history-render" class="flex flex-col gap-4">
                    <!-- Logs guardados -->
                </div>
            </div>

        </div>

        <!-- ACCIONES DE COMANDO -->
        <div class="flex justify-center py-6 gap-4">
            <button onclick="finalizeMission()" onmouseenter="AudioSfx.hover(2000)" class="hc-button bg-red-600 border-none text-white px-24 py-6 text-2xl font-black italic tracking-[0.3em] shadow-[0_0_50px_rgba(255,0,0,0.4)] hover:scale-105 active:scale-95">
                CERRAR MISIÓN Y EXPORTAR DATA
            </button>
        </div>

    </div>

    <!-- OVERLAY DE MISIÓN CUMPLIDA -->
    <div id="overlay" class="fixed inset-0 bg-black/98 z-[1000] hidden flex flex-col items-center justify-center text-center p-10 backdrop-blur-3xl">
        <div class="cyber-border p-16 space-y-10 border-red-600">
            <h1 class="text-8xl font-black italic text-red-600 glitch-flash mb-4">MISIÓN CUMPLIDA</h1>
            <div class="h-2 w-full bg-red-600 mb-8 shadow-[0_0_20px_red]"></div>
            <div id="summary-stats" class="text-4xl font-black font-mono text-white mb-12 space-y-6"></div>
            <div class="flex gap-4 justify-center">
                <button onclick="resetApp()" onmouseenter="AudioSfx.hover()" class="hc-button bg-white text-black px-16 py-6 font-black text-xl italic tracking-widest">INICIAR NUEVO DESPLIEGUE</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN DE OPERACIÓN ---
        const MARGIN_2H = 120 * 60 * 1000;
        const STAGES = [
            { id: 1, name: "PRE-PRODUCCIÓN", meta: 15 },
            { id: 2, name: "VARIABLES CSS", meta: 10 },
            { id: 3, name: "CONTENIDO", meta: 45 },
            { id: 4, name: "ASSETS & MEDIA", meta: 20 },
            { id: 5, name: "QA & DEPLOY", meta: 30 }
        ];

        const CHECKLIST_ITEMS = [
            "Revisar formulario Tally.so completo",
            "Crear carpeta Google Drive: clients/[nombre]/",
            "Descargar fotos del cliente",
            "Comprimir fotos con Squoosh (target 80KB)",
            "Crear rama GitHub: client-[business-name]",
            "Abrir template base correcto (plumber/hvac/contractor)",
            "Cambiar --primary color según tema elegido",
            "Cambiar --font-heading si aplica",
            "Hero headline → tagline del cliente",
            "Reemplazar TODOS los tel: del template",
            "Services Grid → servicios reales (4-6 cards)",
            "Stats → años, trabajos, rating reales",
            "Reviews → texto real de Google del cliente",
            "Maps embed → URL real del cliente",
            "Footer NAP → nombre, dirección, teléfono reales",
            "Schema JSON-LD → actualizar todos los datos",
            "Meta title + description → SEO local con ciudad",
            "Emergency sticky → activar o desactivar",
            "Logo → reemplazar texto nav por imagen si aplica",
            "Fotos → reemplazar URLs Unsplash por fotos reales",
            "Favicon → generar en favicon.io desde logo",
            "Revisar Chrome DevTools → iPhone SE (375px)",
            "Revisar Chrome DevTools → iPad (768px)",
            "Verificar que tel: funciona en mobile",
            "PageSpeed → Performance ≥ 90 / SEO = 100",
            "Validar Schema en schema.org/validator",
            "Deploy en Cloudflare Pages → [business].pages.dev",
            "SMS al cliente con link de preview",
            "Aplicar cambios solicitados (máx 2 rondas)",
            "Configurar DNS en dominio del cliente",
            "Enviar email de entrega + link Stripe $29/mes"
        ];

        let state = {
            client: "OPERACIÓN_GHOST",
            stages: STAGES.map(s => ({ ...s, elapsed: 0, isRunning: false, isDone: false, lastTick: null })),
            checks: {},
            history: []
        };

        // --- MOTOR DE AUDIO MULTI-FRECUENCIA ---
        const AudioSfx = {
            ctx: null,
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            play(freq, type = 'sine', dur = 0.1, vol = 0.2, ramp = true) {
                this.init();
                const osc = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                g.gain.setValueAtTime(vol, this.ctx.currentTime);
                if (ramp) g.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + dur);
                osc.connect(g);
                g.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + dur);
            },
            hover(f = 800) { this.play(f, 'sine', 0.05, 0.1); },
            click() { this.play(1000, 'square', 0.1, 0.15); },
            on() { 
                this.play(600, 'sawtooth', 0.1, 0.1);
                setTimeout(() => this.play(1200, 'sawtooth', 0.1, 0.1), 50);
            },
            off() {
                this.play(1200, 'sawtooth', 0.1, 0.1);
                setTimeout(() => this.play(600, 'sawtooth', 0.1, 0.1), 50);
            },
            check(on = true) {
                if (on) {
                    this.play(800, 'sine', 0.05, 0.1);
                    setTimeout(() => this.play(1600, 'sine', 0.05, 0.1), 30);
                } else {
                    this.play(1600, 'sine', 0.05, 0.1);
                    setTimeout(() => this.play(800, 'sine', 0.05, 0.1), 30);
                }
            },
            success() {
                const notes = [440, 554.37, 659.25, 880];
                notes.forEach((f, i) => setTimeout(() => this.play(f, 'sine', 0.4, 0.1), i * 150));
            }
        };

        // --- FONDO DE RED CIBERNÉTICA ---
        function initCyberCanvas() {
            const canvas = document.getElementById('global-canvas');
            const ctx = canvas.getContext('2d');
            let w, h;

            const resize = () => {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            };
            window.addEventListener('resize', resize);
            resize();

            const points = [];
            for(let i=0; i<80; i++) {
                points.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 1.5,
                    vy: (Math.random() - 0.5) * 1.5,
                    label: Math.random() > 0.8 ? (Math.random() > 0.5 ? "0" : "1") : ""
                });
            }

            const draw = () => {
                ctx.clearRect(0, 0, w, h);
                ctx.fillStyle = "rgba(255, 0, 0, 0.4)";
                ctx.font = "14px JetBrains Mono";
                
                points.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if(p.x < 0) p.x = w; if(p.x > w) p.x = 0;
                    if(p.y < 0) p.y = h; if(p.y > h) p.y = 0;

                    if(p.label) ctx.fillText(p.label, p.x, p.y);
                    
                    points.forEach(p2 => {
                        const d = Math.hypot(p.x - p2.x, p.y - p2.y);
                        if(d < 150) {
                            ctx.beginPath();
                            ctx.strokeStyle = `rgba(255, 0, 0, ${0.15 * (1 - d/150)})`;
                            ctx.lineWidth = 1;
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.stroke();
                        }
                    });
                });
                requestAnimationFrame(draw);
            };
            draw();
        }

        // --- LÓGICA DE APLICACIÓN ---
        function init() {
            const saved = localStorage.getItem('hc_terminal_v5');
            if (saved) {
                const data = JSON.parse(saved);
                state = { ...state, ...data };
                state.stages.forEach(s => s.isRunning = false);
            }
            document.getElementById('client-name').value = state.client;
            renderAll();
            initCyberCanvas();
            setInterval(loop, 10);
        }

        function save() {
            state.client = document.getElementById('client-name').value;
            localStorage.setItem('hc_terminal_v5', JSON.stringify(state));
        }

        function loop() {
            let total = 0;
            const now = Date.now();
            let changed = false;

            state.stages.forEach(s => {
                if (s.isRunning && !s.isDone) {
                    const delta = now - s.lastTick;
                    s.elapsed += delta;
                    s.lastTick = now;
                    changed = true;
                }
                total += s.elapsed;
            });

            document.getElementById('master-timer').innerHTML = formatTime(total);
            const pct = Math.min((total / MARGIN_2H) * 100, 100);
            document.getElementById('margin-bar').style.width = pct + '%';
            document.getElementById('margin-val').innerText = Math.round((total / MARGIN_2H) * 100) + '%';

            if (changed) {
                state.stages.forEach(s => {
                    if (s.isRunning) {
                        const el = document.getElementById(`time-${s.id}`);
                        if (el) el.innerHTML = formatTime(s.elapsed);
                    }
                });
            }
        }

        function formatTime(ms) {
            const h = Math.floor(ms / 3600000);
            const m = Math.floor((ms % 3600000) / 60000);
            const s = Math.floor((ms % 60000) / 1000);
            const c = Math.floor((ms % 1000) / 10);
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}<span class="text-xs opacity-50">.${String(c).padStart(2, '0')}</span>`;
        }

        function setTab(tab) {
            AudioSfx.click();
            ['timer', 'checklist', 'history'].forEach(t => {
                document.getElementById(`view-${t}`).classList.add('hidden');
                document.getElementById(`nav-${t}`).classList.remove('tab-active');
            });
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`nav-${tab}`).classList.add('tab-active');
        }

        function toggleStage(id) {
            const s = state.stages.find(st => st.id === id);
            if (s.isDone) return;
            if (s.isRunning) {
                AudioSfx.off();
                s.isRunning = false;
            } else {
                AudioSfx.on();
                state.stages.forEach(st => st.isRunning = false);
                s.isRunning = true;
                s.lastTick = Date.now();
            }
            renderTimer();
            save();
        }

        function finishStage(id) {
            AudioSfx.success();
            const s = state.stages.find(st => st.id === id);
            s.isDone = true;
            s.isRunning = false;
            renderTimer();
            save();
        }

        function toggleCheck(item) {
            const turningOn = !state.checks[item];
            AudioSfx.check(turningOn);
            state.checks[item] = turningOn;
            renderChecklist();
            save();
            
            // Animacion especial si todos los del grupo o total se acaban
            const totalDone = Object.values(state.checks).filter(v => v).length;
            if (totalDone === CHECKLIST_ITEMS.length) {
                document.getElementById('view-checklist').classList.add('glitch-flash');
                setTimeout(() => document.getElementById('view-checklist').classList.remove('glitch-flash'), 1000);
            }
        }

        // --- RENDERIZADO ---
        function renderAll() {
            renderTimer();
            renderChecklist();
            renderHistory();
        }

        function renderTimer() {
            const container = document.getElementById('view-timer');
            container.innerHTML = '';
            state.stages.forEach(s => {
                const card = document.createElement('div');
                card.className = `cyber-border p-8 min-h-[200px] flex flex-col justify-between transition-all ${s.isDone ? 'border-green-600 opacity-60' : (s.isRunning ? 'timer-active border-red-600' : 'border-zinc-900')}`;
                card.onmouseenter = () => AudioSfx.hover(500);
                
                card.innerHTML = `
                    <div class="sector-num">${String(s.id).padStart(2, '0')}</div>
                    <div class="relative z-10">
                        <p class="text-[10px] text-zinc-600 font-black mb-1 tracking-widest">SUB_SISTEMA_${s.id}</p>
                        <h3 class="font-black text-xl tracking-tighter text-white">${s.name}</h3>
                        <div id="time-${s.id}" class="text-4xl font-black italic mt-4 ${s.isDone ? 'text-green-500' : (s.isRunning ? 'text-red-600' : 'text-zinc-500')}">
                            ${formatTime(s.elapsed)}
                        </div>
                    </div>
                    <div class="flex gap-2 mt-8 relative z-10">
                        <button onclick="toggleStage(${s.id})" class="hc-button flex-grow ${s.isRunning ? 'bg-white text-black' : ''}" ${s.isDone ? 'disabled' : ''}>
                            ${s.isRunning ? 'PAUSAR' : 'ACTIVAR'}
                        </button>
                        <button onclick="finishStage(${s.id})" class="hc-button border-green-900 text-green-500 font-black" ${s.isDone ? 'disabled' : ''}>
                            ${s.isDone ? 'BLOQUEADO' : 'LISTO'}
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderChecklist() {
            const container = document.getElementById('checklist-render');
            container.innerHTML = '';
            let doneCount = 0;
            CHECKLIST_ITEMS.forEach(item => {
                const isChecked = state.checks[item];
                if(isChecked) doneCount++;
                const div = document.createElement('div');
                div.className = `p-5 cyber-border check-item cursor-pointer flex items-center gap-4 transition-all ${isChecked ? 'done opacity-50' : 'border-zinc-900'}`;
                div.onmouseenter = () => AudioSfx.hover(700);
                div.onclick = () => toggleCheck(item);
                div.innerHTML = `
                    <div class="w-7 h-7 border-2 flex items-center justify-center ${isChecked ? 'bg-green-600 border-green-600' : 'border-zinc-700'}">
                        ${isChecked ? '<span class="text-black font-black">✓</span>' : ''}
                    </div>
                    <span class="text-[12px] font-black ${isChecked ? 'line-through text-zinc-500' : 'text-white'}">${item}</span>
                `;
                container.appendChild(div);
            });
            document.getElementById('check-progress-text').innerText = `${doneCount}/${CHECKLIST_ITEMS.length} COMPLETADOS`;
        }

        function renderHistory() {
            const container = document.getElementById('history-render');
            container.innerHTML = '';
            [...state.history].reverse().forEach(h => {
                const div = document.createElement('div');
                div.className = "p-6 cyber-border border-zinc-900 flex justify-between items-center hover:border-red-600 transition-all";
                div.onmouseenter = () => AudioSfx.hover(400);
                div.innerHTML = `
                    <div>
                        <p class="text-[10px] text-zinc-600 font-bold">${h.date}</p>
                        <h4 class="font-black italic text-2xl text-white tracking-tighter">${h.client}</h4>
                        <p class="text-[9px] text-zinc-500 mt-1">Checklist: ${h.checks} items | Margen: ${h.pct}%</p>
                    </div>
                    <div class="text-right">
                        <p class="text-3xl font-black ${h.success ? 'text-green-500' : 'text-red-600'} italic">${h.total}</p>
                        <p class="text-[10px] font-black tracking-widest text-zinc-600">${h.success ? 'ÓPTIMO' : 'EXCEDIDO'}</p>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // --- EXPORTACIÓN DE IMAGEN (CANVAS) ---
        function exportMissionImage(log) {
            const canvas = document.getElementById('hidden-canvas');
            canvas.width = 1200;
            canvas.height = 800;
            const ctx = canvas.getContext('2d');

            // Fondo
            ctx.fillStyle = '#020202';
            ctx.fillRect(0, 0, 1200, 800);

            // Grid
            ctx.strokeStyle = 'rgba(255, 0, 0, 0.1)';
            for(let i=0; i<1200; i+=40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 800); ctx.stroke(); }
            for(let i=0; i<800; i+=40) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(1200, i); ctx.stroke(); }

            // Cabecera
            ctx.fillStyle = '#FF0000';
            ctx.font = 'bold 60px JetBrains Mono';
            ctx.fillText(log.client, 50, 100);
            
            ctx.font = '20px JetBrains Mono';
            ctx.fillStyle = '#888';
            ctx.fillText(`FECHA: ${log.date}`, 50, 140);

            // Stats Principales
            ctx.fillStyle = log.success ? '#00FF41' : '#FF0000';
            ctx.font = 'bold 100px JetBrains Mono';
            ctx.fillText(log.total, 50, 260);

            ctx.font = 'bold 30px JetBrains Mono';
            ctx.fillText(`CONSUMO MARGEN: ${log.pct}%`, 50, 310);
            ctx.fillText(`PROTOCOLO: ${log.checks}/${CHECKLIST_ITEMS.length} COMPLETADOS`, 50, 360);

            // Detalle de Fases
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 20px JetBrains Mono';
            ctx.fillText('DESGLOSE DE FASES:', 700, 100);
            state.stages.forEach((s, i) => {
                ctx.fillStyle = s.isDone ? '#00FF41' : '#444';
                const timeStr = formatTime(s.elapsed).replace(/<[^>]*>/g, "");
                ctx.fillText(`${i+1}. ${s.name}: ${timeStr}`, 700, 140 + (i * 40));
            });

            // Decoracion Marca
            ctx.fillStyle = '#FF0000';
            ctx.fillRect(50, 700, 1100, 5);
            ctx.font = 'bold 20px JetBrains Mono';
            ctx.fillText('HAMMER & CIRCUIT // MISSION CONTROL SYSTEM', 50, 750);

            // Descargar
            const link = document.createElement('a');
            link.download = `REPORTE_${log.client}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function finalizeMission() {
            AudioSfx.success();
            const total = state.stages.reduce((acc, s) => acc + s.elapsed, 0);
            const pct = Math.round((total / MARGIN_2H) * 100);
            const doneChecks = Object.values(state.checks).filter(v => v).length;
            
            const log = {
                date: new Date().toLocaleString(),
                client: state.client.toUpperCase(),
                total: formatTime(total).replace(/<[^>]*>/g, ""),
                pct: pct,
                checks: doneChecks,
                success: total <= MARGIN_2H
            };

            state.history.push(log);
            
            // Exportar imagen
            exportMissionImage(log);

            document.getElementById('summary-stats').innerHTML = `
                TIEMPO: ${log.total}<br>
                MARGEN: ${pct}%<br>
                CHECKLIST: ${doneChecks}/${CHECKLIST_ITEMS.length}
            `;
            document.getElementById('overlay').classList.remove('hidden');
            save();
        }

        function resetApp() {
            AudioSfx.click();
            state.stages = STAGES.map(s => ({ ...s, elapsed: 0, isRunning: false, isDone: false, lastTick: null }));
            state.checks = {};
            document.getElementById('overlay').classList.add('hidden');
            renderAll();
            save();
        }

        window.onload = init;
    </script>
</body>
</html>
