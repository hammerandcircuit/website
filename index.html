            --bg-main: #F3F4F6;
            --bg-dark: #FFFFFF;

            --text-primary: #111827;
            --text-secondary: #4B5563;
            --border-color: rgba(0, 0, 0, 0.1);

        /* High Contrast Mode */
        body.theme-hc {
            --accent: #FFFF00; 
            --bg-main: #000000;
            --bg-dark: #000000;
            --bg-gray: #000000;
            --text-primary: #FFFFFF;
            --text-secondary: #FFFFFF;

            height: 100%;

        .video-scrim {
            position: fixed;
            top: 0;
            left: 0;

            background: linear-gradient(to bottom, rgba(10, 10, 10, 0.7) 0%, rgba(10, 10, 10, 0.9) 100%);

        .theme-hc #hero-video, .theme-hc .video-scrim { display: none; }

        /* Capa de grano/ruido */
        .carbon-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
            z-index: -5;
        }

        .shutter-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--accent); z-index: 100;
            transform: translateY(100%); pointer-events: none;
            transition: transform 0.5s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .shutter-active { transform: translateY(0); }

        .crt-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.01));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none; z-index: 50;
        }

        .theme-hc .crt-overlay { display: none; }

        .page-entry { animation: contentSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

            from { opacity: 0; transform: translateY(15px); filter: brightness(1.5); }

                p_m_item_1: "Hosting Seguro + Protección SSL", p_m_item_2: "Gestión Profesional de Dominio", p_m_item_3: "Reporte de Desempeño + Soporte",
                p_m_savings: "[MODO_AHORRO: $80 / 3meses · $300 / año]",
                p_specs_title: "DETALLES TÉCNICOS Y LÍMITES",
                p_specs_maint: "Mantenimiento incluye: 1-4 fotos (quitar/poner) y 1 cuartilla de texto al mes. No incluye secciones completas.",
                p_specs_report: "Plus: Recibirás un reporte mensual de desempeño con datos de visitantes y clics en tu teléfono.",
                contact_title: "CONTACTA AL LAB",
                contact_lead: "Ferran | Tech Lead",
                contact_email: "ferranasmodeus@hammercircuit.com",
                port_title: "PLANTILLAS MAESTRAS",
                port_sub: "Status de Red — Velocidad de carga verificada sub-1s",
                port_view: "Ver Demo en Vivo",
                port_switch: "Cambiar Variación:"
            }
        };

        let currentLang = 'en';
        let currentPage = 'home';
        let currentTheme = 'dark';

        async function setTheme(theme) {
            currentTheme = theme;
            const body = document.body;
            body.classList.remove('theme-light', 'theme-hc');
            
            if (theme === 'light') body.classList.add('theme-light');
            if (theme === 'hc') body.classList.add('theme-hc');

            document.querySelectorAll('.theme-btn').forEach(btn => {
                const isActive = btn.id === `theme-${theme}`;
                btn.querySelector('svg, span')?.classList.toggle('text-white', isActive && theme === 'dark');
                btn.querySelector('svg, span')?.classList.toggle('text-blue-500', isActive && theme === 'light');
                btn.querySelector('svg, span')?.classList.toggle('text-yellow-400', isActive && theme === 'hc');
                btn.querySelector('svg, span')?.classList.toggle('text-gray-400', !isActive);
            });

            renderPage(currentPage);
        }

        async function changePage(page) {
            if (page === currentPage && document.getElementById('content-area').innerHTML !== "") return;
            const loader = document.getElementById('loader');
            const shutter = document.getElementById('shutter');
            loader.style.width = '100%';
            shutter.classList.add('shutter-active');
            await new Promise(r => setTimeout(r, 450));
            currentPage = page;
            renderPage(page);
            updateNav(page);
            shutter.classList.remove('shutter-active');
            setTimeout(() => { loader.style.width = '0%'; }, 100);
            document.getElementById('content-area').scrollTop = 0;
        }

        function updateTemplateVariation(templateId, index) {
            const template = templates.find(t => t.id === templateId);
            const variation = template.variations[index];
            const imgEl = document.getElementById(`img-${templateId}`);
            const linkEl = document.getElementById(`link-${templateId}`);
            
            imgEl.style.opacity = '0';
            setTimeout(() => {
                imgEl.src = variation.img;
                linkEl.href = variation.link;
                imgEl.style.opacity = '1';
            }, 150);

            document.querySelectorAll(`.dot-${templateId}`).forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        }

        function renderPage(page) {
            const content = document.getElementById('content-area');
            const t = translations[currentLang] || translations['en'];
            content.classList.remove('page-entry');
            void content.offsetWidth;
            content.classList.add('page-entry');

            switch(page) {
                case 'home':
                    content.innerHTML = `
                        <div class="max-w-4xl">
                            <h2 class="text-4xl sm:text-5xl md:text-7xl lg:text-9xl font-heading uppercase italic leading-[0.85] mb-8" style="color: var(--text-primary)">${t.hero_title}</h2>
                            <p class="text-base md:text-2xl lg:text-3xl mb-10 max-w-2xl font-light italic leading-relaxed border-l-2 border-tool-red pl-5 sm:pl-6" style="color: var(--text-secondary)">${t.hero_desc}</p>
                            <div class="flex flex-wrap gap-4">
                                <button onclick="changePage('protocol')" class="bg-tool-red text-white px-7 py-4 md:px-12 md:py-6 font-heading text-lg md:text-3xl uppercase italic tracking-tighter hover:scale-105 transition-transform shadow-[0_15px_40px_rgba(227,6,19,0.4)]">
                                    ${t.hero_cta}
                                </button>
                            </div>
                        </div>
                    `;
                    break;
                case 'portfolio':
                    let portfolioHtml = `
                        <h2 class="text-4xl md:text-7xl font-heading uppercase italic mb-2" style="color: var(--text-primary)">${t.port_title}</h2>
                        <p class="text-gray-500 font-mono text-[9px] mb-10 uppercase tracking-widest">${t.port_sub}</p>
                        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl">
                    `;
                    
                    templates.forEach(temp => {
                        portfolioHtml += `
                            <div class="template-card border-t-4 p-4 flex flex-col group transition-all">
                                <div class="relative overflow-hidden aspect-[4/5] bg-black mb-6 border border-white/5">
                                    <img id="img-${temp.id}" src="${temp.variations[0].img}" alt="${temp.name}" class="w-full h-full object-cover">
                                    <div class="absolute top-2 right-2 bg-tool-red text-white font-mono text-[8px] px-2 py-1 uppercase italic tracking-tighter">Verified_UX</div>
                                </div>
                                
                                <div class="mb-4">
                                    <h3 class="text-2xl font-heading uppercase italic leading-none mb-1" style="color: var(--text-primary)">${temp.name}</h3>
                                    <div class="text-tool-red font-mono text-[9px] uppercase tracking-widest font-bold">${temp.trade}</div>
                                </div>

                                <div class="bg-black/40 p-3 font-mono text-[9px] mb-6 space-y-2 border border-white/5" style="color: var(--text-secondary)">
                                    <div class="flex justify-between"><span>CORE_LOAD:</span> <span class="text-green-400">0.8s</span></div>
                                    <div class="flex justify-between"><span>VITAL_SCORE:</span> <span class="text-green-400">99+</span></div>
                                    
                                    <div class="pt-2 border-t border-white/5">
                                        <div class="mb-2 text-[8px] uppercase tracking-tighter">${t.port_switch}</div>
                                        <div class="flex gap-3 items-center">
                                            ${temp.variations.map((v, i) => `
                                                <div 
                                                    onclick="updateTemplateVariation('${temp.id}', ${i})"
                                                    class="color-dot dot-${temp.id} ${i === 0 ? 'active' : ''}" 
                                                    style="background-color: ${v.color}"
                                                    title="${v.name}"
                                                ></div>
                                            `).join('')}
                                        </div>
                                    </div>
                                </div>

                                <a id="link-${temp.id}" href="${temp.variations[0].link}" target="_blank" class="mt-auto block w-full bg-white/5 hover:bg-tool-red text-white py-3 font-heading uppercase italic text-center text-sm tracking-widest transition-colors border border-white/10">
                                    ${t.port_view}
                                </a>
                            </div>
                        `;
                    });

                    portfolioHtml += `</div>`;
                    content.innerHTML = portfolioHtml;
                    break;
                case 'protocol':
                    content.innerHTML = `
                        <h2 class="text-4xl sm:text-5xl md:text-6xl font-heading uppercase italic mb-2" style="color: var(--text-primary)">${t.protocol_title}</h2>
                        <p class="text-gray-500 font-mono text-[9px] mb-8 uppercase tracking-widest">${t.protocol_sub}</p>
                        <div class="grid md:grid-cols-2 gap-4 lg:gap-6 max-w-6xl">
                            <div class="p-5 md:p-8 bg-tool-gray/30 border-l-4 border-tool-red hover:bg-tool-gray/50 transition-colors">
                                <h4 class="text-xl md:text-2xl font-heading uppercase italic mb-2" style="color: var(--text-primary)">${t.p_item_1_t}</h4>
                                <p class="text-sm italic leading-snug" style="color: var(--text-secondary)">${t.p_item_1_d}</p>
                            </div>
                            <div class="p-5 md:p-8 bg-tool-gray/30 border-l-4 border-white/10" style="border-color: var(--border-color)">
                                <h4 class="text-xl md:text-2xl font-heading uppercase italic mb-2" style="color: var(--text-primary)">${t.p_item_2_t}</h4>
                                <p class="text-sm italic leading-snug" style="color: var(--text-secondary)">${t.p_item_2_d}</p>
                            </div>
                            <div class="p-5 md:p-8 bg-tool-gray/30 border-l-4 border-white/10" style="border-color: var(--border-color)">
                                <h4 class="text-xl md:text-2xl font-heading uppercase italic mb-2" style="color: var(--text-primary)">${t.p_item_3_t}</h4>
                                <p class="text-sm italic leading-snug" style="color: var(--text-secondary)">${t.p_item_3_d}</p>
                            </div>
                            <div class="p-5 md:p-8 bg-tool-gray/30 border-l-4 border-white/10" style="border-color: var(--border-color)">
                                <h4 class="text-xl md:text-2xl font-heading uppercase italic mb-2" style="color: var(--text-primary)">${t.p_item_4_t}</h4>
                                <p class="text-sm italic leading-snug" style="color: var(--text-secondary)">${t.p_item_4_d}</p>
                            </div>
                        </div>
                        <div class="mt-8 p-6 bg-tool-red/10 border border-tool-red/30">
                            <p class="text-base md:text-2xl font-heading uppercase italic text-center" style="color: var(--text-primary)">${t.protocol_summary}</p>
                        </div>
                    `;
                    break;
                case 'solutions':
                    content.innerHTML = `
                        <h2 class="text-4xl md:text-6xl font-heading uppercase italic mb-8" style="color: var(--text-primary)">${t.sol_title}</h2>
                        <div class="p-6 md:p-10 bg-tool-gray/30 border-l-8 border-tool-red mb-10 italic text-lg md:text-3xl leading-tight" style="color: var(--text-primary)">
                            "${t.sol_desc}"
                        </div>
                        <div class="grid md:grid-cols-3 gap-8">
                            <div class="space-y-3">
                                <div class="text-tool-red font-heading text-xl md:text-2xl italic uppercase leading-none">${t.sol_item_1_t}</div>
                                <p class="text-sm italic" style="color: var(--text-secondary)">${t.sol_item_1_d}</p>
                            </div>
                            <div class="space-y-3">
                                <div class="text-tool-red font-heading text-xl md:text-2xl italic uppercase leading-none">${t.sol_item_2_t}</div>
                                <p class="text-sm italic" style="color: var(--text-secondary)">${t.sol_item_2_d}</p>
                            </div>
                            <div class="space-y-3">
                                <div class="text-tool-red font-heading text-xl md:text-2xl italic uppercase leading-none">${t.sol_item_3_t}</div>
                                <p class="text-sm italic" style="color: var(--text-secondary)">${t.sol_item_3_d}</p>
                            </div>
                        </div>
                    `;
                    break;
                case 'pricing':
                    content.innerHTML = `
                        <div class="max-w-6xl mx-auto">
                            <h2 class="text-4xl sm:text-5xl md:text-7xl font-heading uppercase italic text-center mb-10" style="color: var(--text-primary)">${t.price_title}</h2>
                            <div class="grid lg:grid-cols-2 gap-6 items-stretch mb-12">
                                <div class="bg-tool-gray p-6 md:p-12 border-t-8 flex flex-col hover:opacity-90 transition-all" style="border-color: var(--border-color)">
                                    <div class="text-3xl md:text-5xl font-heading font-black italic mb-6 uppercase leading-none" style="color: var(--text-primary)">${t.p_build_title}</div>
                                    <ul class="space-y-3 text-xs md:text-sm font-mono uppercase flex-grow mb-6" style="color: var(--text-secondary)">
                                        <li>[+] ${t.p_item_1}</li>
                                        <li>[+] ${t.p_item_2}</li>
                                        <li>[+] ${t.p_item_3}</li>
                                    </ul>
                                    <div class="text-tool-red font-mono text-[10px] sm:text-xs uppercase italic mb-6 font-bold">${t.p_gift}</div>
                                    <button onclick="changePage('protocol')" class="text-[9px] font-mono uppercase italic underline text-left hover:opacity-70 transition-colors" style="color: var(--text-secondary)">Activation_Protocol</button>
                                </div>
                                <div class="bg-tool-gray p-6 md:p-12 border-t-8 border-tool-red flex flex-col shadow-[0_20px_60px_rgba(227,6,19,0.15)] transform lg:scale-105 z-10">
                                    <div class="text-2xl md:text-4xl font-heading font-black italic mb-6 uppercase leading-tight" style="color: var(--text-primary)">${t.p_maint_title}</div>
                                    <ul class="space-y-3 text-xs md:text-sm font-mono uppercase flex-grow mb-8" style="color: var(--text-primary)">
                                        <li>[+] ${t.p_m_item_1}</li>
                                        <li>[+] ${t.p_m_item_2}</li>
                                        <li>[+] ${t.p_m_item_3}</li>
                                    </ul>
                                    <div class="mb-6 p-3 bg-black/40 border-l-2 border-tool-red/40">
                                        <p class="text-[9px] md:text-[11px] font-mono text-tool-red uppercase italic tracking-wider animate-pulse">
                                            ${t.p_m_savings}
                                        </p>
                                    </div>
                                    <span class="text-[9px] font-mono uppercase italic" style="color: var(--text-secondary)">Status: Priority_Active</span>
                                </div>
                            </div>
                        </div>
                    `;
                    break;
                case 'contact':
                    content.innerHTML = `
                        <h2 class="text-4xl md:text-6xl font-heading uppercase italic mb-10" style="color: var(--text-primary)">${t.contact_title}</h2>
                        <div class="grid md:grid-cols-2 gap-6 max-w-5xl">
                            <div class="p-8 md:p-10 bg-tool-gray border-l-8 border-tool-red">
                                <div class="text-[9px] font-mono uppercase mb-4 tracking-widest italic font-black" style="color: var(--text-secondary)">Operator:</div>
                                <h4 class="text-2xl md:text-4xl font-heading uppercase italic mb-2" style="color: var(--text-primary)">${t.contact_lead}</h4>
                                <p class="text-tool-red font-mono text-base md:text-xl font-black italic break-all">${t.contact_email}</p>
                            </div>
                            <div class="flex flex-col justify-center border p-8 bg-black/40 shadow-inner" style="border-color: var(--border-color)">
                                <p class="text-xl md:text-3xl italic leading-tight font-heading uppercase" style="color: var(--text-secondary)">
                                    "WE HANDLE THE <span style="color: var(--text-primary)">UPDATES</span>, YOU HANDLE THE <span style="color: var(--text-primary)">JOBS</span>."
                                </p>
                            </div>
                        </div>
                    `;
                    break;
            }
        }

        function updateNav(page) {
            document.querySelectorAll('.switch-btn').forEach(btn => btn.classList.remove('switch-active'));
            const activeBtn = document.getElementById(`nav-${page}`);
            if (activeBtn) activeBtn.classList.add('switch-active');
        }

        function setLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                const isActive = btn.id === `lang-${lang}`;
                btn.classList.toggle('bg-tool-red', isActive);
                btn.classList.toggle('text-white', isActive);
                btn.classList.toggle('text-gray-500', !isActive);
            });
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) el.innerText = translations[lang][key];
            });
            renderPage(currentPage);
        }

        window.onload = () => { 
            setLanguage('en');
            setTheme('dark');
            changePage('home');
        };
    </script>
</body>
</html>
