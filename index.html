        :root {

        body.theme-light {
            --bg-main: #F4F4F5;
            --bg-dark: #FFFFFF;
            --bg-gray: #E4E4E7;
            --text-primary: #09090B;

            --border-color: rgba(0, 0, 0, 0.08);
            --grid-opacity: 0.2;

        body.theme-hc {
            --accent: #FFFF00; 
            --bg-main: #000000;
            --bg-dark: #000000;
            --bg-gray: #000000;
            --text-primary: #FFFFFF;
            --text-secondary: #FFFFFF;
            --border-color: #FFFFFF;
            --grid-opacity: 0.1;

            background-color: var(--bg-main); 
            color: var(--text-primary); 
            height: 100vh; 
            height: 100dvh; 
            overflow: hidden; 
            transition: background-color 0.2s ease, color 0.2s ease; 
        }
        
        .grid-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -10;
            background-image: linear-gradient(var(--border-color) 1px, transparent 1px), linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 50px 50px; background-position: center center; opacity: var(--grid-opacity); pointer-events: none;
        }

        .grid-vignette {

            background: radial-gradient(circle at center, transparent 0%, var(--bg-main) 90%); pointer-events: none;
        }

        .carbon-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.03; pointer-events: none; z-index: -5;
        }

        .shutter-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--accent); z-index: 100; transform: translateY(100%);
            pointer-events: none; transition: transform 0.4s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .shutter-active { transform: translateY(0); }

        .crt-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.03) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.005), rgba(0, 255, 0, 0.005), rgba(0, 0, 255, 0.005));
            background-size: 100% 4px, 4px 100%; pointer-events: none; z-index: 50;
        }

        .theme-hc .crt-overlay { display: none; }

        .page-entry { animation: contentSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes contentSlideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .switch-btn { transition: all 0.2s ease; border-left: 0px solid var(--accent); color: var(--text-secondary); }
        .switch-active {
            background: linear-gradient(90deg, rgba(227, 6, 19, 0.1) 0%, transparent 100%);
            border-left-width: 6px !important; color: var(--text-primary) !important;
        }

        .logo-frame {
            display: flex; align-items: center; justify-content: center;
            width: 140px; height: 40px;
        }
        @media (min-width: 768px) { .logo-frame { width: 280px; height: 80px; } }
        
        .logo-frame img { width: 100%; height: auto; aspect-ratio: 7/2; object-fit: contain; }
        .theme-light .logo-frame img { filter: invert(1) brightness(0.2); }

        #content-area::-webkit-scrollbar { width: 4px; }
        #content-area::-webkit-scrollbar-track { background: transparent; }
        #content-area::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        .loading-bar {
            height: 3px; background: var(--accent); width: 0;
            position: absolute; bottom: -3px; left: 0;
            transition: width 0.3s ease;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .color-dot { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; transition: transform 0.2s; border: 1px solid var(--border-color); }
        .color-dot:hover { transform: scale(1.2); }
        .color-dot.active { outline: 2px solid var(--text-primary); outline-offset: 2px; }
        
        .template-card { border-color: var(--border-color); background-color: var(--bg-dark); }

            overflow: hidden;
            transition: all 0.3s ease;
            z-index: 1;
        }
        .pay-button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
            pointer-events: none;
        }
        @keyframes shine {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }

        let currentLang = 'en';
        let currentPage = 'home';
        let currentTheme = 'dark';

        async function setTheme(theme) {
            currentTheme = theme;
            document.body.classList.remove('theme-light', 'theme-hc');
            if (theme === 'light') document.body.classList.add('theme-light');
            if (theme === 'hc') document.body.classList.add('theme-hc');

            document.querySelectorAll('.theme-btn').forEach(btn => {
                const isActive = btn.id === `theme-${theme}`;
                const inner = btn.querySelector('svg, span');
                if (inner) {
                    inner.classList.toggle('text-white', isActive && theme === 'dark');
                    inner.classList.toggle('text-blue-600', isActive && theme === 'light');
                    inner.classList.toggle('text-yellow-400', isActive && theme === 'hc');
                    inner.classList.toggle('text-zinc-500', !isActive);
                }
            });
            renderPage(currentPage);
        }

        async function changePage(page) {
            if (page === currentPage && document.getElementById('content-area').innerHTML !== "") return;
            const loader = document.getElementById('loader');
            const shutter = document.getElementById('shutter');
            
            loader.style.width = '100%';
            shutter.classList.add('shutter-active');
            
            await new Promise(r => setTimeout(r, 400));
            currentPage = page;
            renderPage(page);
            updateNav(page);
            
            shutter.classList.remove('shutter-active');
            setTimeout(() => { loader.style.width = '0%'; }, 50);
            document.getElementById('content-area').scrollTop = 0;
        }

        function updateTemplateVariation(templateId, index) {
            const template = templates.find(t => t.id === templateId);
            const variation = template.variations[index];
            const imgEl = document.getElementById(`img-${templateId}`);
            const linkEl = document.getElementById(`link-${templateId}`);
            imgEl.style.opacity = '0.3';
            setTimeout(() => {
                imgEl.src = variation.img;
                if (linkEl) linkEl.href = variation.link;
                imgEl.style.opacity = '1';
            }, 150);
            document.querySelectorAll(`.dot-${templateId}`).forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        }

        function updateNav(page) {
            document.querySelectorAll('.switch-btn').forEach(btn => btn.classList.remove('switch-active'));
            const activeBtn = document.getElementById(`nav-${page}`);
            if (activeBtn) activeBtn.classList.add('switch-active');
        }

        function setLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                const isActive = btn.id === `lang-${lang}`;
                btn.classList.toggle('bg-tool-red', isActive);
                btn.classList.toggle('text-white', isActive);
                btn.classList.toggle('text-zinc-500', !isActive);
            });
            renderPage(currentPage);
        }
