<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Activation - Hammer & Circuit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --m-red: #C1272D;
            --m-red-dark: #7A1418;
            --m-black: #050505;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--m-black);
            color: #E0E0E0;
            overflow-x: hidden;
            perspective: 2000px;
        }
        .master-card {
            background: linear-gradient(145deg, #151515, #080808);
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
            transform: rotateX(1deg);
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .btn-m-3d {
            background: linear-gradient(145deg, #d42b32, #9b1a1e);
            box-shadow: 0 4px 0 var(--m-red-dark), 0 8px 15px rgba(0,0,0,0.6);
            transition: all 0.1s;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 1rem;
            cursor: pointer;
        }
        .btn-m-3d:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--m-red-dark); }
        .gear-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.08; pointer-events: none; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .gear-anim { animation: rotate 60s linear infinite; transform-origin: center; }
        input, textarea, select {
            background: #000 !important;
            border: 1px solid #333 !important;
            border-radius: 10px !important;
            padding: 12px 16px !important;
            color: white !important;
            font-size: 0.9rem !important;
            width: 100%;
        }
        input:focus, textarea:focus, select:focus {
            border-color: var(--m-red) !important;
            box-shadow: 0 0 15px rgba(193, 39, 45, 0.3) !important;
            outline: none !important;
        }
        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
        }
        .lang-label { font-size: 9px; font-weight: 900; color: #555; letter-spacing: 0.2em; margin-right: 12px; }
        .lang-btn {
            background: #111; border: 1px solid #333; box-shadow: 0 3px 0 #000;
            transition: all 0.2s; font-size: 10px; font-weight: 800; width: 45px; height: 30px;
            display: flex; align-items: center; justify-content: center; border-radius: 6px;
            cursor: pointer; color: #aaa;
        }
        .lang-btn.active { background: var(--m-red); border-color: var(--m-red); box-shadow: 0 3px 0 var(--m-red-dark); color: white; }
        @keyframes hydraulic { 0% { width: 0%; } 100% { width: 100%; } }
        .loading-bar { animation: hydraulic 2s infinite; }
        .file-input-wrapper {
            position: relative; border: 2px dashed #333; border-radius: 12px;
            padding: 20px; text-align: center; transition: all 0.3s; cursor: pointer;
        }
        .file-input-wrapper:hover { border-color: var(--m-red); background: rgba(193, 39, 45, 0.05); }
        .file-input-wrapper input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        select option { background: #111; color: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const DICTIONARY = {
            en: {
                translate: "TRANSLATE ENGINE",
                welcome: "Production Activation Module",
                subWelcome: "Your business is moving to the digital front line. Submit your technical specs to initiate the 48-hour engineering cycle.",
                getStarted: "Initiate System",
                step1: "01. Identity Matrix",
                step2: "02. Technical Specs",
                step3: "03. Asset Repository",
                bizName: "Business Name",
                bizNameEx: "e.g. Mike's Garza Plumbing LLC",
                tagline: "Market Slogan",
                taglineEx: "e.g. Austin's Trusted Plumber Since 2009",
                services: "Service Catalog (One per line)",
                servicesEx: "Leak Repair\nWater Heaters\nDrain Cleaning\nEmergency Service",
                servicesHint: "We build a dedicated card for each.",
                address: "Business Address",
                addressEx: "e.g. 789 Pipe Rd, Phoenix, AZ 85001",

                hours: "Operation Hours",
                hoursEx: "e.g. Mon-Fri 7am-6pm / Emergency 24/7",
                emergency: "Emergency Service Available?",
                emergencyYes: "Yes — 24/7 Emergency Service",
                emergencyNo: "No — Regular Hours Only",
                color: "Visual Engine Theme",
                logo: "Official Logo Upload",
                logoHint: "PNG/JPG preferred. If empty, we will use typography.",
                photos: "Work Photos (3–5 images)",
                photosHint: "Before/after jobs, team, equipment. Each under 5MB.",
                mapsEmbed: "Google Maps Embed URL",
                mapsEx: "https://maps.google.com/maps?q=your+business+name",
                mapsHint: "Go to Google Maps → Share → Embed a map → Copy link.",
                reviews: "Google Reputation Link",
                reviewsEx: "Paste your Google Maps business URL",
                notes: "Special Calibration Notes",
                notesEx: "Any specific requests for the development team...",
                next: "Advance Phase",
                back: "Previous",
                send: "Finalize & Launch Build",
                success: "System Online: Data Synced",
                successSub: "Technical specifications received. Your project has entered the production queue.",
                eta: "Estimated Deployment: 48 Hours",
                filesReminder: "📦 If your photos exceeded the upload limit, email them to hammerandcircuit@gmail.com referencing your business name.",
                loading: "Compressing Data...",
                required: "Required field"
            },
            es: {
                translate: "MOTOR DE TRADUCCIÓN",
                welcome: "Módulo de Activación de Producción",
                subWelcome: "Su negocio avanza a la primera línea digital. Envíe sus especificaciones técnicas para iniciar el ciclo de ingeniería de 48 horas.",
                getStarted: "Iniciar Sistema",
                step1: "01. Matriz de Identidad",
                step2: "02. Especificaciones Técnicas",
                step3: "03. Repositorio de Activos",
                bizName: "Nombre del Negocio",
                bizNameEx: "Ej: Mike's Garza Plumbing LLC",
                tagline: "Eslogan de Mercado",
                taglineEx: "Ej: El plomero de confianza en Austin desde 2009",
                services: "Catálogo de Servicios (Uno por línea)",
                servicesEx: "Reparación de fugas\nCalentadores\nLimpieza de drenaje\nServicio de Emergencia",
                servicesHint: "Construiremos una tarjeta para cada servicio.",
                address: "Dirección del Negocio",
                addressEx: "Ej: 789 Pipe Rd, Phoenix, AZ 85001",
                addressHint: "Se usa en el footer NAP y Google Maps.",
                area: "Área de Operación / Ciudades",
                areaEx: "Ej: Austin, Round Rock, Cedar Park",
                phone: "Teléfono de Comando (Botón Llamar)",
                phoneEx: "Ej: +1 (512) 555-0123",
                email: "Email Público del Negocio",
                emailEx: "Ej: contacto@mikegarza.com",
                hours: "Horario de Operación",
                hoursEx: "Ej: Lun-Vie 7am-6pm / Emergencias 24/7",
                emergency: "¿Servicio de Emergencia Disponible?",
                emergencyYes: "Sí — Servicio de Emergencia 24/7",
                emergencyNo: "No — Solo Horario Regular",
                color: "Tema del Motor Visual",
                logo: "Subir Logo Oficial",
                logoHint: "Formatos PNG/JPG. Si está vacío, usaremos tipografía.",
                photos: "Fotos de Trabajos (3–5 imágenes)",
                photosHint: "Antes/después, equipo, herramientas. Máx 5MB cada una.",
                mapsEmbed: "URL de Embed de Google Maps",
                mapsEx: "https://maps.google.com/maps?q=nombre+de+tu+negocio",
                mapsHint: "Google Maps → Compartir → Insertar mapa → Copiar enlace.",
                reviews: "Link de Reputación Google",
                reviewsEx: "Pegue su link de Google Maps aquí",
                notes: "Notas de Calibración Especial",
                notesEx: "Cualquier petición específica para el equipo técnico...",
                next: "Siguiente Fase",
                back: "Anterior",
                send: "Finalizar e Iniciar Construcción",
                success: "Sistema Online: Datos Sincronizados",
                successSub: "Especificaciones recibidas. Su proyecto ha entrado en la línea de producción.",
                eta: "Despliegue Estimado: 48 Horas",
                filesReminder: "📦 Si las fotos excedieron el límite, envíelas a hammerandcircuit@gmail.com con el nombre de su negocio.",
                loading: "Comprimiendo Datos...",
                required: "Campo requerido"
            },
            zh: {
                translate: "翻译引擎",
                welcome: "生产启动模块",
                subWelcome: "您的企业正走向数字化前线。请提交您的技术规格，以启动 48 小时的工程周期。",
                getStarted: "启动系统",
                step1: "01. 身份矩阵",
                step2: "02. 技术规格",
                step3: "03. 资产库",
                bizName: "企业法定名称",
                bizNameEx: "例如：Mike's Garza Plumbing LLC",
                tagline: "市场标语",
                taglineEx: "例如：自 2009 年起奥斯汀值得信赖的管道工",
                services: "服务目录（每行一个）",
                servicesEx: "漏水修理\n热水器安装\n排水管清洁\n紧急服务",
                servicesHint: "我们将为每项服务构建独立卡片。",
                address: "企业地址",
                addressEx: "例如：789 Pipe Rd, Phoenix, AZ 85001",
                addressHint: "用于页脚 NAP 信息和 Google 地图。",
                area: "业务区域 / 服务城市",
                areaEx: "例如：奥斯汀, 圆石城, 塞达尔帕克",
                phone: "指令电话（CTA 按钮）",
                phoneEx: "例如：+1 (512) 555-0123",
                email: "公开业务电子邮箱",
                emailEx: "例如：contact@mikegarza.com",
                hours: "营业时间",
                hoursEx: "例如：周一至周五 7am-6pm / 24小时急修",
                emergency: "是否提供紧急服务？",
                emergencyYes: "是 — 24小时紧急服务",
                emergencyNo: "否 — 仅常规营业时间",
                color: "视觉引擎主题",
                logo: "官方徽标上传",
                logoHint: "优先使用 PNG/JPG。如果为空，我们将使用文字图标。",
                photos: "工作照片（3–5张）",
                photosHint: "施工前后、团队、设备照片。每张不超过5MB。",
                mapsEmbed: "Google 地图嵌入链接",
                mapsEx: "https://maps.google.com/maps?q=您的企业名称",
                mapsHint: "Google 地图 → 分享 → 嵌入地图 → 复制链接。",
                reviews: "Google 评价链接",
                reviewsEx: "在此处粘贴您的 Google 地图链接",
                notes: "特殊校准备注",
                notesEx: "对开发团队的任何具体要求...",
                next: "进入下一阶段",
                back: "返回",
                send: "完成并启动构建",
                success: "系统上线：数据已同步",
                successSub: "技术规格已接收。您的项目已进入生产队列。",
                eta: "预计交付时间：48 小时",
                filesReminder: "📦 如果照片超出上传限制，请发送至 hammerandcircuit@gmail.com 并注明您的企业名称。",
                loading: "正在压缩数据...",
                required: "必填项"
            }
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            const paths = {
                check: "M20 6L9 17l-5-5",
                hammer: "M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.77 3.77z",
                rocket: "M4.5 16.5c-1.5 1.26-2 5-2 2v-4c0-1.1.9-2 2-2h4M15 3l6 6-11 11-4-1 1-4 10-10z",
                upload: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12",
                image: "M21 19V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2zM8.5 13.5l2.5 3 3.5-4.5 4.5 6H5l3.5-4.5z"
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d={paths[name] || ""} />
                </svg>
            );
        };

        function App() {
            const [lang, setLang] = useState('en');
            const [step, setStep] = useState(0);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [logoFile, setLogoFile] = useState(null);
            const [photoFiles, setPhotoFiles] = useState([]);
            const [formData, setFormData] = useState({
                businessName: '', tagline: '', services: '', address: '', area: '',
                phone: '', email: '', hours: '', emergency: 'yes',
                color: 'Electric Blue', reviewsLink: '', mapsEmbed: '', notes: ''
            });

            const t = DICTIONARY[lang];

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleLogoChange = (e) => setLogoFile(e.target.files[0]);

            const handlePhotosChange = (e) => {
                const files = Array.from(e.target.files).slice(0, 5);
                setPhotoFiles(files);
            };

            const handleSubmit = async () => {
                setIsSubmitting(true);
                const data = new FormData();

                // 1. Añadir campos de texto primero (Solo si tienen valor para evitar basura en el mail)
                Object.keys(formData).forEach(key => {
                    if (formData[key]) {
                        data.append(key, formData[key]);
                    }
                });

                data.append("_subject", `🔨 ACTIVATION: ${formData.businessName}`);
                data.append("_template", "table");

                // 2. Añadir ARCHIVOS al final (Nombres con "file_" para forzar detección de FormSubmit)
                if (logoFile) {
                    data.append("file_logo", logoFile);
                }

                photoFiles.forEach((file, i) => {
                    data.append(`file_work_photo_${i + 1}`, file);
                });

                try {
                    const response = await fetch("https://formsubmit.co/ajax/hammerandcircuit@gmail.com", {
                        method: "POST",
                        body: data // No se añaden headers, el navegador pone el boundary correcto para archivos
                    });
                    if (response.ok) setStep(4);
                    else alert("Sync Error. Please retry.");
                } catch (error) {
                    alert("Sync Error. Please retry.");
                }
                setIsSubmitting(false);
            };

            const step1Valid = formData.businessName && formData.services;
            const step2Valid = formData.phone && formData.area && formData.address;

            return (
                <div className="min-h-screen p-6 flex flex-col items-center justify-center relative">

                    {/* Gear BG */}
                    <div className="gear-bg flex items-center justify-center">
                        <svg width="800" height="800" className="gear-anim" viewBox="0 0 100 100">
                            <path fill="#222" d="M50 20c-16.5 0-30 13.5-30 30s13.5 30 30 30 30-13.5 30-30-13.5-30-30-30zm0 10c11 0 20 9 20 20s-9 20-20 20-20-9-20-20 9-20 20-20z M50 0l4 15h-8z M100 50l-15 4v-8z M50 100l-4-15h8z M0 50l15-4v8z M15 15l10 10l-6 6z M85 15l-10 10l6 6z M85 85l-10-10l6-6z M15 85l10-10l-6-6z" />
                        </svg>
                    </div>

                    {/* Language Switcher */}
                    <div className="flex items-center mb-8 bg-[#111] p-2 rounded-2xl border border-white/5 shadow-xl z-10">
                        <span className="lang-label ml-2">{t.translate}</span>
                        <div className="flex gap-3 pr-2">
                            {['en', 'es', 'zh'].map(l => (
                                <button key={l} onClick={() => setLang(l)}
                                    className={`lang-btn ${lang === l ? 'active' : ''}`}>{l.toUpperCase()}</button>
                            ))}
                        </div>
                    </div>

                    <div className="max-w-2xl w-full">
                        <div className="master-card rounded-[3rem] overflow-hidden border-2 border-white/5 shadow-2xl">

                            {/* Progress Bar */}
                            <div className="h-2 w-full bg-white/5 overflow-hidden">
                                {isSubmitting
                                    ? <div className="loading-bar h-full bg-red-600"></div>
                                    : <div className="h-full bg-red-600 transition-all duration-700" style={{ width: `${(step / 4) * 100}%` }}></div>
                                }
                            </div>

                            <div className="p-8 md:p-14">

                                {/* STEP 0 — Welcome */}
                                {step === 0 && (
                                    <div className="space-y-8 text-center">
                                        <div className="w-20 h-20 bg-red-600 rounded-[1.5rem] flex items-center justify-center mx-auto shadow-[0_15px_30px_rgba(193,39,45,0.4)] rotate-3">
                                            <Icon name="hammer" size={40} className="text-white" />
                                        </div>
                                        <div className="space-y-3">
                                            <h1 className="text-4xl font-black italic uppercase tracking-tighter leading-none">{t.welcome}</h1>
                                            <p className="text-gray-400 text-sm font-medium leading-relaxed max-w-sm mx-auto">{t.subWelcome}</p>
                                        </div>
                                        {/* Step indicators */}
                                        <div className="flex justify-center gap-6 text-[10px] font-black uppercase text-gray-600">
                                            <span>01 · Identity</span>
                                            <span className="text-gray-700">—</span>
                                            <span>02 · Technical</span>
                                            <span className="text-gray-700">—</span>
                                            <span>03 · Assets</span>
                                        </div>
                                        <button onClick={() => setStep(1)}
                                            className="btn-m-3d w-full py-5 text-lg font-black uppercase italic tracking-widest flex items-center justify-center gap-3">
                                            {t.getStarted} <Icon name="check" size={20} />
                                        </button>
                                    </div>
                                )}

                                {/* STEP 1 — Identity */}
                                {step === 1 && (
                                    <div className="space-y-6">
                                        <h3 className="text-xl font-black uppercase text-red-600 tracking-widest border-l-4 border-red-600 pl-4">{t.step1}</h3>

                                        <div>
                                            <label>{t.bizName} <span className="text-red-500">*</span></label>
                                            <input name="businessName" value={formData.businessName}
                                                onChange={handleChange} placeholder={t.bizNameEx} />
                                        </div>

                                        <div>
                                            <label>{t.tagline}</label>
                                            <input name="tagline" value={formData.tagline}
                                                onChange={handleChange} placeholder={t.taglineEx} />
                                        </div>

                                        <div>
                                            <label>
                                                {t.services} <span className="text-red-500">*</span>
                                                <span className="opacity-40 ml-2 normal-case font-normal">({t.servicesHint})</span>
                                            </label>
                                            <textarea name="services" value={formData.services}
                                                onChange={handleChange} className="h-32"
                                                placeholder={t.servicesEx} />
                                        </div>

                                        {/* NEW: Address */}
                                        <div>
                                            <label>{t.address} <span className="text-red-500">*</span></label>
                                            <input name="address" value={formData.address}
                                                onChange={handleChange} placeholder={t.addressEx} />
                                            <p className="text-[10px] text-gray-600 mt-1 italic">{t.addressHint}</p>
                                        </div>

                                        <button disabled={!step1Valid || !formData.address}
                                            onClick={() => setStep(2)}
                                            className={`btn-m-3d w-full py-5 font-black uppercase italic tracking-widest mt-2 ${(!step1Valid || !formData.address) ? 'opacity-30 cursor-not-allowed' : ''}`}>
                                            {t.next}
                                        </button>
                                    </div>
                                )}

                                {/* STEP 2 — Technical Specs */}
                                {step === 2 && (
                                    <div className="space-y-6">
                                        <h3 className="text-xl font-black uppercase text-red-600 tracking-widest border-l-4 border-red-600 pl-4">{t.step2}</h3>

                                        <div>
                                            <label>{t.area} <span className="text-red-500">*</span></label>
                                            <input name="area" value={formData.area}
                                                onChange={handleChange} placeholder={t.areaEx} />
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div>
                                                <label>{t.phone} <span className="text-red-500">*</span></label>
                                                <input name="phone" value={formData.phone}
                                                    onChange={handleChange} placeholder={t.phoneEx} />
                                            </div>
                                            <div>
                                                <label>{t.email}</label>
                                                <input name="email" value={formData.email}
                                                    onChange={handleChange} placeholder={t.emailEx} />
                                            </div>
                                        </div>

                                        <div>
                                            <label>{t.hours}</label>
                                            <input name="hours" value={formData.hours}
                                                onChange={handleChange} placeholder={t.hoursEx} />
                                        </div>

                                        {/* NEW: Emergency toggle */}
                                        <div>
                                            <label>{t.emergency}</label>
                                            <select name="emergency" value={formData.emergency} onChange={handleChange}>
                                                <option value="yes">{t.emergencyYes}</option>
                                                <option value="no">{t.emergencyNo}</option>
                                            </select>
                                        </div>

                                        <div className="flex gap-4 pt-2">
                                            <button onClick={() => setStep(1)}
                                                className="bg-white/5 border border-white/10 px-8 rounded-2xl font-bold uppercase text-[10px] cursor-pointer">
                                                {t.back}
                                            </button>
                                            <button disabled={!step2Valid}
                                                onClick={() => setStep(3)}
                                                className={`btn-m-3d flex-1 py-5 font-black uppercase italic tracking-widest ${!step2Valid ? 'opacity-30 cursor-not-allowed' : ''}`}>
                                                {t.next}
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {/* STEP 3 — Assets */}
                                {step === 3 && (
                                    <div className="space-y-6">
                                        <h3 className="text-xl font-black uppercase text-red-600 tracking-widest border-l-4 border-red-600 pl-4">{t.step3}</h3>

                                        {/* Color Theme */}
                                        <div>
                                            <label>{t.color}</label>
                                            <select name="color" value={formData.color} onChange={handleChange}>
                                                <option value="Electric Blue">⚡ Electric Blue</option>
                                                <option value="Construction Orange">🔶 Construction Orange</option>
                                                <option value="Dark Steel">⬛ Dark Steel</option>
                                                <option value="Modern Business">⬜ Modern Business</option>
                                            </select>
                                        </div>

                                        {/* Logo Upload */}
                                        <div className="space-y-2">
                                            <label>{t.logo}</label>
                                            <div className="file-input-wrapper">
                                                <Icon name="upload" className="mx-auto text-gray-600 mb-2" />
                                                <p className="text-[10px] font-bold text-gray-500 uppercase">
                                                    {logoFile ? `✅ ${logoFile.name}` : "Select Logo File"}
                                                </p>
                                                <input type="file" onChange={handleLogoChange} accept="image/*" />
                                            </div>
                                            <p className="text-[9px] text-gray-600 italic">{t.logoHint}</p>
                                        </div>

                                        {/* NEW: Work Photos */}
                                        <div className="space-y-2">
                                            <label>{t.photos}</label>
                                            <div className="file-input-wrapper">
                                                <Icon name="image" className="mx-auto text-gray-600 mb-2" />
                                                <p className="text-[10px] font-bold text-gray-500 uppercase">
                                                    {photoFiles.length > 0
                                                        ? `✅ ${photoFiles.length} file${photoFiles.length > 1 ? 's' : ''} selected`
                                                        : "Select 3–5 Photos"}
                                                </p>
                                                {photoFiles.length > 0 && (
                                                    <div className="mt-2 flex flex-wrap gap-1 justify-center">
                                                        {photoFiles.map((f, i) => (
                                                            <span key={i} className="text-[9px] bg-white/10 px-2 py-1 rounded-full text-gray-400">
                                                                {f.name.length > 20 ? f.name.slice(0, 18) + '…' : f.name}
                                                            </span>
                                                        ))}
                                                    </div>
                                                )}
                                                <input type="file" multiple accept="image/*" onChange={handlePhotosChange} />
                                            </div>
                                            <p className="text-[9px] text-gray-600 italic">{t.photosHint}</p>
                                        </div>

                                        {/* NEW: Google Maps Embed URL */}
                                        <div>
                                            <label>{t.mapsEmbed}</label>
                                            <input name="mapsEmbed" value={formData.mapsEmbed}
                                                onChange={handleChange} placeholder={t.mapsEx} />
                                            <p className="text-[9px] text-gray-600 mt-1 italic">{t.mapsHint}</p>
                                        </div>

                                        {/* Google Reviews */}
                                        <div>
                                            <label>{t.reviews}</label>
                                            <input name="reviewsLink" value={formData.reviewsLink}
                                                onChange={handleChange} placeholder={t.reviewsEx} />
                                        </div>

                                        {/* Notes */}
                                        <div>
                                            <label>{t.notes}</label>
                                            <textarea name="notes" value={formData.notes}
                                                onChange={handleChange} className="h-24"
                                                placeholder={t.notesEx} />
                                        </div>

                                        <div className="flex gap-4 pt-2">
                                            <button onClick={() => setStep(2)}
                                                className="bg-white/5 border border-white/10 px-8 rounded-2xl font-bold uppercase text-[10px] cursor-pointer">
                                                {t.back}
                                            </button>
                                            <button onClick={handleSubmit} disabled={isSubmitting}
                                                className={`btn-m-3d flex-1 py-5 font-black uppercase italic tracking-widest ${isSubmitting ? 'opacity-50 cursor-not-allowed' : ''}`}>
                                                {isSubmitting ? t.loading : t.send}
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {/* STEP 4 — Success */}
                                {step === 4 && (
                                    <div className="space-y-8 text-center py-10">
                                        <div className="w-24 h-24 bg-green-500/20 text-green-500 rounded-[2rem] flex items-center justify-center mx-auto border-2 border-green-500/30">
                                            <Icon name="rocket" size={48} />
                                        </div>
                                        <div className="space-y-2">
                                            <h3 className="text-3xl font-black italic uppercase tracking-tighter">{t.success}</h3>
                                            <p className="text-gray-400 font-bold leading-relaxed">{t.successSub}</p>
                                        </div>

                                        {/* Summary card */}
                                        <div className="text-left bg-white/5 rounded-2xl p-5 space-y-2 border border-white/10">
                                            <p className="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-3">Build Summary</p>
                                            <div className="flex justify-between text-sm">
                                                <span className="text-gray-500">Business</span>
                                                <span className="font-bold text-white">{formData.businessName}</span>
                                            </div>
                                            <div className="flex justify-between text-sm">
                                                <span className="text-gray-500">Phone</span>
                                                <span className="font-bold text-white">{formData.phone}</span>
                                            </div>
                                            <div className="flex justify-between text-sm">
                                                <span className="text-gray-500">Theme</span>
                                                <span className="font-bold text-white">{formData.color}</span>
                                            </div>
                                            <div className="flex justify-between text-sm">
                                                <span className="text-gray-500">Emergency</span>
                                                <span className={`font-bold ${formData.emergency === 'yes' ? 'text-green-400' : 'text-gray-400'}`}>
                                                    {formData.emergency === 'yes' ? '✅ 24/7' : '—'}
                                                </span>
                                            </div>
                                            <div className="flex justify-between text-sm">
                                                <span className="text-gray-500">Photos</span>
                                                <span className="font-bold text-white">{photoFiles.length} uploaded</span>
                                            </div>
                                        </div>

                                        {photoFiles.length === 0 && (
                                            <div className="p-4 bg-red-600/5 border border-red-600/20 rounded-xl text-[10px] text-gray-500 italic">
                                                {t.filesReminder}
                                            </div>
                                        )}

                                        <div className="pt-6 border-t border-white/5 space-y-2">
                                            <p className="text-[11px] text-gray-500 uppercase font-black tracking-widest">{t.eta}</p>
                                            <p className="text-[12px] text-red-600 font-black uppercase italic tracking-tighter leading-none">
                                                Hammer & Circuit Web Lab 🔨
                                            </p>
                                        </div>
                                    </div>
                                )}

                            </div>
                        </div>

                        {/* Step indicator dots */}
                        {step > 0 && step < 4 && (
                            <div className="flex justify-center gap-2 mt-6">
                                {[1, 2, 3].map(s => (
                                    <div key={s} className={`h-1 rounded-full transition-all duration-500 ${step >= s ? 'bg-red-600 w-8' : 'bg-white/10 w-4'}`}></div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
