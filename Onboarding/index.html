<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Activation - Hammer & Circuit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --m-red: #C1272D;
            --m-red-dark: #7A1418;
            --m-black: #050505;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--m-black);
            color: #E0E0E0;
            overflow-x: hidden;
            perspective: 2000px;
        }

        .master-card {
            background: linear-gradient(145deg, #151515, #080808);
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
            transform: rotateX(1deg);
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .btn-m-3d {
            background: linear-gradient(145deg, #d42b32, #9b1a1e);
            box-shadow: 0 4px 0 var(--m-red-dark), 0 8px 15px rgba(0,0,0,0.6);
            transition: all 0.1s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-m-3d:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 var(--m-red-dark);
        }

        .gear-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.08;
            pointer-events: none;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .gear-anim { animation: rotate 60s linear infinite; transform-origin: center; }

        input, textarea, select {
            background: #000 !important;
            border: 1px solid #333 !important;
            border-radius: 10px !important;
            padding: 12px 16px !important;
            color: white !important;
            font-size: 0.9rem !important;
        }
        input:focus, textarea:focus {
            border-color: var(--m-red) !important;
            box-shadow: 0 0 15px rgba(193, 39, 45, 0.3) !important;
        }
        
        .lang-label {
            font-size: 9px;
            font-weight: 900;
            color: #555;
            letter-spacing: 0.2em;
            margin-right: 12px;
        }

        .lang-btn {
            background: #111;
            border: 1px solid #333;
            box-shadow: 0 3px 0 #000;
            transition: all 0.2s;
            font-size: 10px;
            font-weight: 800;
            width: 45px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }
        .lang-btn.active {
            background: var(--m-red);
            border-color: var(--m-red);
            box-shadow: 0 3px 0 var(--m-red-dark);
            color: white;
        }

        @keyframes hydraulic {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .loading-bar { animation: hydraulic 2s infinite; }

        .file-input-wrapper {
            position: relative;
            border: 2px dashed #333;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
        }
        .file-input-wrapper:hover { border-color: var(--m-red); background: rgba(193, 39, 45, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const DICTIONARY = {
            en: {
                translate: "TRANSLATE ENGINE",
                welcome: "Production Activation Module",
                subWelcome: "Your business is moving to the digital front line. Submit your technical specs to initiate the 48-hour engineering cycle.",
                getStarted: "Initiate System",
                step1: "01. Identity Matrix",
                step2: "02. Technical Specs",
                step3: "03. Asset Repository",
                bizName: "Business Name",
                bizNameEx: "e.g. Mike's Garza Plumbing LLC",
                tagline: "Market Slogan",
                taglineEx: "e.g. Austin's Trusted Plumber Since 2009",
                services: "Service Catalog (One per line)",
                servicesEx: "Leak Repair / Water Heaters / Drain Cleaning",
                servicesHint: "We build a dedicated section for each.",
                area: "Operation Area / Cities Served",
                areaEx: "e.g. Austin, Round Rock, Cedar Park",
                phone: "Command Phone (CTA Button)",
                phoneEx: "e.g. +1 (512) 555-0123",
                email: "Public Business Email",
                emailEx: "e.g. contact@mikegarza.com",
                hours: "Operation Hours",
                hoursEx: "e.g. Mon-Fri 7am-6pm / Emergency 24/7",
                color: "Visual Engine Theme",
                logo: "Official Logo Upload",
                logoHint: "PNG/JPG preferred. If empty, we will use typography.",
                reviews: "Google Reputation Link",
                reviewsEx: "Paste your Google Maps URL",
                notes: "Special Calibration Notes",
                notesEx: "Any specific requests for the development team...",
                next: "Advance Phase",
                back: "Previous",
                send: "Finalize & Launch Build",
                success: "System Online: Data Synced",
                successSub: "Technical specifications received. Your project has entered the production queue.",
                eta: "Estimated Deployment: 48 Hours",
                filesReminder: "📦 CRITICAL: If you have additional work photos (3-5), please email them to hammerandcircuit@gmail.com referencing your business name.",
                loading: "Compressing Data..."
            },
            es: {
                translate: "MOTOR DE TRADUCCIÓN",
                welcome: "Módulo de Activación de Producción",
                subWelcome: "Su negocio avanza a la primera línea digital. Envíe sus especificaciones técnicas para iniciar el ciclo de ingeniería de 48 horas.",
                getStarted: "Iniciar Sistema",
                step1: "01. Matriz de Identidad",
                step2: "02. Especificaciones Técnicas",
                step3: "03. Repositorio de Activos",
                bizName: "Nombre del Negocio",
                bizNameEx: "Ej: Mike's Garza Plumbing LLC",
                tagline: "Eslogan de Mercado",
                taglineEx: "Ej: El plomero de confianza en Austin desde 2009",
                services: "Catálogo de Servicios (Uno por línea)",
                servicesEx: "Reparación de fugas / Calentadores / Limpieza de drenaje",
                servicesHint: "Construiremos una sección para cada uno.",
                area: "Área de Operación / Ciudades",
                areaEx: "Ej: Austin, Round Rock, Cedar Park",
                phone: "Teléfono de Comando (Botón Llamar)",
                phoneEx: "Ej: +1 (512) 555-0123",
                email: "Email Público del Negocio",
                emailEx: "Ej: contacto@mikegarza.com",
                hours: "Horario de Operación",
                hoursEx: "Ej: Lun-Vie 7am-6pm / Emergencias 24/7",
                color: "Tema del Motor Visual",
                logo: "Subir Logo Oficial",
                logoHint: "Formatos PNG/JPG. Si está vacío, usaremos tipografía.",
                reviews: "Link de Reputación Google",
                reviewsEx: "Pegue su link de Google Maps aquí",
                notes: "Notas de Calibración Especial",
                notesEx: "Cualquier petición específica para el equipo técnico...",
                next: "Siguiente Fase",
                back: "Anterior",
                send: "Finalizar e Iniciar Construcción",
                success: "Sistema Online: Datos Sincronizados",
                successSub: "Especificaciones recibidas. Su proyecto ha entrado en la línea de producción.",
                eta: "Despliegue Estimado: 48 Horas",
                filesReminder: "📦 CRÍTICO: Si tiene fotos adicionales de sus trabajos (3-5), envíelas a hammerandcircuit@gmail.com referenciando su negocio.",
                loading: "Comprimiendo Datos..."
            },
            zh: {
                translate: "翻译引擎",
                welcome: "生产启动模块",
                subWelcome: "您的企业正走向数字化前线。请提交您的技术规格，以启动 48 小时的工程周期。",
                getStarted: "启动系统",
                step1: "01. 身份矩阵",
                step2: "02. 技术规格",
                step3: "03. 资产库",
                bizName: "企业法定名称",
                bizNameEx: "例如：Mike's Garza Plumbing LLC",
                tagline: "市场标语",
                taglineEx: "例如：自 2009 年起奥斯汀值得信赖的管道工",
                services: "服务目录（每行一个）",
                servicesEx: "漏水修理 / 热水器安装 / 排水管清洁",
                servicesHint: "列出 4-8 项主要服务。",
                area: "业务区域 / 服务城市",
                areaEx: "例如：奥斯汀, 圆石城, 塞达尔帕克",
                phone: "指令电话（CTA 按钮）",
                phoneEx: "例如：+1 (512) 555-0123",
                email: "公开业务电子邮箱",
                emailEx: "例如：contact@mikegarza.com",
                hours: "营业时间",
                hoursEx: "例如：周一至周五 7am-6pm / 24小时急修",
                color: "视觉引擎主题",
                logo: "官方徽标上传",
                logoHint: "优先使用 PNG/JPG。如果为空，我们将使用文字图标。",
                reviews: "Google 评价链接",
                reviewsEx: "在此处粘贴您的 Google 地图链接",
                notes: "特殊校准备注",
                notesEx: "对开发团队的任何具体要求...",
                next: "进入下一阶段",
                back: "返回",
                send: "完成并启动构建",
                success: "系统上线：数据已同步",
                successSub: "技术规格已接收。您的项目已进入生产队列。",
                eta: "预计交付时间：48 小时",
                filesReminder: "📦 至关重要：如果您有额外的工作照片（3-5张），请发送至 hammerandcircuit@gmail.com 并注明您的企业名称。",
                loading: "正在压缩数据..."
            }
        };

        const Icon = ({ name, size = 20, className="" }) => {
            const paths = {
                check: "M20 6L9 17l-5-5",
                hammer: "M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.77 3.77z",
                rocket: "M4.5 16.5c-1.5 1.26-2 5-2 2v-4c0-1.1.9-2 2-2h4M15 3l6 6-11 11-4-1 1-4 10-10z",
                upload: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M17 8l-5-5-5 5 M12 3v12"
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d={paths[name] || ""} />
                </svg>
            );
        };

        function App() {
            const [lang, setLang] = useState('en');
            const [step, setStep] = useState(0);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [logoFile, setLogoFile] = useState(null);
            const [formData, setFormData] = useState({
                businessName: '', tagline: '', services: '', area: '',
                phone: '', email: '', hours: '', color: 'Electric Blue',
                reviewsLink: '', notes: ''
            });

            const t = DICTIONARY[lang];

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleFileChange = (e) => {
                setLogoFile(e.target.files[0]);
            };

            const handleSubmit = async (e) => {
                setIsSubmitting(true);
                const data = new FormData();
                Object.keys(formData).forEach(key => data.append(key, formData[key]));
                if (logoFile) data.append("business_logo", logoFile);
                data.append("_subject", `ACTIVATION: ${formData.businessName}`);
                
                try {
                    const response = await fetch("https://formsubmit.co/ajax/hammerandcircuit@gmail.com", {
                        method: "POST",
                        body: data
                    });
                    if (response.ok) setStep(4);
                } catch (error) {
                    alert("Sync Error. Please retry.");
                }
                setIsSubmitting(false);
            };

            return (
                <div className="min-h-screen p-6 flex flex-col items-center justify-center relative">
                    <div className="gear-bg flex items-center justify-center">
                        <svg width="800" height="800" className="gear-anim" viewBox="0 0 100 100">
                            <path fill="#222" d="M50 20c-16.5 0-30 13.5-30 30s13.5 30 30 30 30-13.5 30-30-13.5-30-30-30zm0 10c11 0 20 9 20 20s-9 20-20 20-20-9-20-20 9-20 20-20z M50 0l4 15h-8z M100 50l-15 4v-8z M50 100l-4-15h8z M0 50l15-4v8z M15 15l10 10l-6 6z M85 15l-10 10l6 6z M85 85l-10-10l6-6z M15 85l10-10l-6-6z" />
                        </svg>
                    </div>

                    <div className="flex items-center mb-8 bg-[#111] p-2 rounded-2xl border border-white/5 shadow-xl z-10">
                        <span className="lang-label ml-2">{t.translate}</span>
                        <div className="flex gap-3 pr-2">
                            {['en', 'es', 'zh'].map(l => (
                                <button key={l} onClick={()=>setLang(l)} 
                                        className={`lang-btn ${lang===l?'active':''}`}>{l.toUpperCase()}</button>
                            ))}
                        </div>
                    </div>

                    <div className="max-w-2xl w-full">
                        <div className="master-card rounded-[3rem] overflow-hidden border-2 border-white/5 shadow-2xl">
                            <div className={`h-2 w-full bg-white/5 overflow-hidden`}>
                                {isSubmitting ? <div className="loading-bar h-full bg-red-600"></div> :
                                <div className="h-full bg-red-600 transition-all duration-700" style={{width: `${(step/4)*100}%`}}></div>}
                            </div>

                            <div className="p-8 md:p-14">
                                {step === 0 && (
                                    <div className="space-y-8 text-center">
                                        <div className="w-20 h-20 bg-red-600 rounded-[1.5rem] flex items-center justify-center mx-auto shadow-[0_15px_30px_rgba(193,39,45,0.4)] rotate-3">
                                            <Icon name="hammer" size={40} className="text-white" />
                                        </div>
                                        <div className="space-y-3">
                                            <h1 className="text-4xl font-black italic uppercase tracking-tighter leading-none">{t.welcome}</h1>
                                            <p className="text-gray-400 text-sm font-medium leading-relaxed max-w-sm mx-auto">{t.subWelcome}</p>
                                        </div>
                                        <button onClick={() => setStep(1)} className="btn-m-3d w-full py-5 text-lg font-black uppercase italic tracking-widest flex items-center justify-center gap-3">
                                            {t.getStarted} <Icon name="check" size={20}/>
                                        </button>
                                    </div>
                                )}

                                {step === 1 && (
                                    <div className="space-y-8">
                                        <h3 className="text-xl font-black uppercase text-red-600 tracking-widest border-l-4 border-red-600 pl-4">{t.step1}</h3>
                                        <div className="space-y-6">
                                            <div>
                                                <label>{t.bizName}</label>
                                                <input name="businessName" value={formData.businessName} onChange={handleChange} className="w-full" placeholder={t.bizNameEx} />
                                            </div>
                                            <div>
                                                <label>{t.tagline}</label>
                                                <input name="tagline" value={formData.tagline} onChange={handleChange} className="w-full" placeholder={t.taglineEx} />
                                            </div>
                                            <div>
                                                <label>{t.services} <span className="opacity-40 ml-2">({t.servicesHint})</span></label>
                                                <textarea name="services" value={formData.services} onChange={handleChange} className="w-full h-32" placeholder={t.servicesEx} />
                                            </div>
                                        </div>
                                        <button disabled={!formData.businessName || !formData.services} onClick={() => setStep(2)} 
                                                className={`btn-m-3d w-full py-5 font-black uppercase italic tracking-widest mt-4 ${(!formData.businessName || !formData.services) ? 'opacity-30' : ''}`}>
                                            {t.next}
                                        </button>
                                    </div>
                                )}

                                {step === 2 && (
                                    <div className="space-y-8">
                                        <h3 className="text-xl font-black uppercase text-red-600 tracking-widest border-l-4 border-red-600 pl-4">{t.step2}</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="md:col-span-2">
                                                <label>{t.area}</label>
                                                <input name="area" value={formData.area} onChange={handleChange} className="w-full" placeholder={t.areaEx} />
                                            </div>
                                            <div>
                                                <label>{t.phone}</label>
                                                <input name="phone" value={formData.phone} onChange={handleChange} className="w-full" placeholder={t.phoneEx} />
                                            </div>
                                            <div>
                                                <label>{t.email}</label>
                                                <input name="email" value={formData.email} onChange={handleChange} className="w-full" placeholder={t.emailEx} />
                                            </div>
                                            <div className="md:col-span-2">
                                                <label>{t.hours}</label>
                                                <input name="hours" value={formData.hours} onChange={handleChange} className="w-full" placeholder={t.hoursEx} />
                                            </div>
                                        </div>
                                        <div className="flex gap-4">
                                            <button onClick={() => setStep(1)} className="bg-white/5 border border-white/10 px-8 rounded-2xl font-bold uppercase text-[10px]">{t.back}</button>
                                            <button onClick={() => setStep(3)} className="btn-m-3d flex-1 py-5 font-black uppercase italic tracking-widest">{t.next}</button>
                                        </div>
                                    </div>
                                )}

                                {step === 3 && (
                                    <div className="space-y-8">
                                        <h3 className="text-xl font-black uppercase text-red-600 tracking-widest border-l-4 border-red-600 pl-4">{t.step3}</h3>
                                        <div className="space-y-6">
                                            <div>
                                                <label>{t.color}</label>
                                                <select name="color" value={formData.color} onChange={handleChange} className="w-full">
                                                    <option>⚡ Electric Blue</option>
                                                    <option>🔶 Construction Orange</option>
                                                    <option>⬛ Dark Steel</option>
                                                </select>
                                            </div>
                                            
                                            <div className="space-y-2">
                                                <label>{t.logo}</label>
                                                <div className="file-input-wrapper">
                                                    <Icon name="upload" className="mx-auto text-gray-600 mb-2" />
                                                    <p className="text-[10px] font-bold text-gray-500 uppercase">{logoFile ? logoFile.name : "Select Logo File"}</p>
                                                    <input type="file" onChange={handleFileChange} className="absolute inset-0 opacity-0 cursor-pointer" accept="image/*" />
                                                </div>
                                                <p className="text-[8px] text-gray-600 italic">{t.logoHint}</p>
                                            </div>

                                            <div>
                                                <label>{t.reviews}</label>
                                                <input name="reviewsLink" value={formData.reviewsLink} onChange={handleChange} className="w-full" placeholder={t.reviewsEx} />
                                            </div>
                                            <div>
                                                <label>{t.notes}</label>
                                                <textarea name="notes" value={formData.notes} onChange={handleChange} className="w-full h-24" placeholder={t.notesEx} />
                                            </div>
                                        </div>
                                        <div className="flex gap-4">
                                            <button onClick={() => setStep(2)} className="bg-white/5 border border-white/10 px-8 rounded-2xl font-bold uppercase text-[10px]">{t.back}</button>
                                            <button onClick={handleSubmit} disabled={isSubmitting} className="btn-m-3d flex-1 py-5 font-black uppercase italic tracking-widest">
                                                {isSubmitting ? t.loading : t.send}
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {step === 4 && (
                                    <div className="space-y-8 text-center py-10">
                                        <div className="w-24 h-24 bg-green-500/20 text-green-500 rounded-[2rem] flex items-center justify-center mx-auto border-2 border-green-500/30">
                                            <Icon name="rocket" size={48} />
                                        </div>
                                        <div className="space-y-2">
                                            <h3 className="text-3xl font-black italic uppercase tracking-tighter">{t.success}</h3>
                                            <p className="text-gray-400 font-bold leading-relaxed">{t.successSub}</p>
                                        </div>
                                        <div className="p-4 bg-red-600/5 border border-red-600/20 rounded-xl text-[10px] text-gray-500 italic">
                                            {t.filesReminder}
                                        </div>
                                        <div className="pt-8 border-t border-white/5 space-y-2">
                                            <p className="text-[11px] text-gray-500 uppercase font-black tracking-widest">{t.eta}</p>
                                            <p className="text-[12px] text-red-600 font-black uppercase italic tracking-tighter leading-none">Hammer & Circuit Web Lab 🔨</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
